name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        working-directory: services/supervisor_api
        run: uv sync --extra dev
      - name: Lint
        working-directory: services/supervisor_api
        run: uv run ruff check src tests
      - name: Test
        working-directory: services/supervisor_api
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        working-directory: apps/control-center
        run: pnpm typecheck
      - name: Build
        working-directory: apps/control-center
        run: pnpm build
