services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aic
      POSTGRES_PASSWORD: aic
      POSTGRES_DB: aic
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aic"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  supervisor_api:
    build:
      context: ./services/supervisor_api
    environment:
      DATABASE_URL: postgresql+psycopg://aic:aic@postgres:5432/aic
      EVIDENCE_HMAC_SECRET: ${EVIDENCE_HMAC_SECRET:-dev-hmac-secret-change-me}
      POLICY_PATH: /policies/refund.base.v1.yaml
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./packages/policies:/policies:ro
    command: >
      sh -c "alembic upgrade head &&
             uvicorn supervisor_api.main:app --host 0.0.0.0 --port 8000"

  control_center:
    build:
      context: ./apps/control-center
    environment:
      SUPERVISOR_API_URL: http://supervisor_api:8000
      NEXT_PUBLIC_SUPERVISOR_API_URL: http://localhost:8000
      SUPERVISOR_APP_ID: ${SUPERVISOR_APP_ID:-}
      SUPERVISOR_SECRET: ${SUPERVISOR_SECRET:-}
    ports:
      - "3000:3000"
    depends_on:
      - supervisor_api

volumes:
  pgdata:
