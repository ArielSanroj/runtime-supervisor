[project]
name = "mcp-supervisor"
version = "0.3.0"
description = "MCP server exposing runtime-supervisor tools to LLM agents (Claude Desktop, Cursor, etc.)"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Ariel San Martín" }]
requires-python = ">=3.10"
keywords = ["mcp", "ai-agents", "claude", "guardrails", "runtime-supervisor"]
dependencies = [
    "mcp>=1.2",
    "supervisor-client>=0.3,<0.4",
]

[project.urls]
Homepage = "https://github.com/ArielSanroj/runtime-supervisor"
Repository = "https://github.com/ArielSanroj/runtime-supervisor"

[project.scripts]
mcp-supervisor = "mcp_supervisor.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_supervisor"]
