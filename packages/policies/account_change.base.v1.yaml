name: account_change.base
version: 1
description: >
  Base policy for mutations on user/customer/account records. Account
  takeover is one of the most common agent abuse vectors — a prompt
  injection that makes the agent "update the customer's email to X"
  effectively hands the account to the attacker.
rules:
  - id: account-takeover-combo
    when: >
      (int('new_email' in payload) + int('new_phone' in payload) + int('new_password' in payload)) >= 2
    action: deny
    reason: account-takeover-combination
    explanation: >
      Cambiar dos o más de email, teléfono o password en una sola llamada
      es la firma clásica de un secuestro de cuenta. El supervisor lo
      bloquea por default; cambios legítimos van de a uno o pasan por
      flow de reset.
  - id: fresh-customer-email-change
    when: "'new_email' in payload and payload.get('customer_age_days', 999) < 30"
    action: review
    reason: email-change-on-fresh-customer
    explanation: >
      Cambiar el email de un customer con menos de 30 días de antigüedad
      es estadísticamente sospechoso (fraude de sign-up). Escalar a humano
      antes de permitirlo.
  - id: role-escalation
    when: "payload.get('new_role') in ('admin', 'owner', 'superuser')"
    action: deny
    reason: role-escalation-denied
    explanation: >
      Un agente nunca debería elevar roles a admin/owner/superuser por
      su cuenta. Si el use case es legítimo, el cambio tiene que venir
      del operador humano vía consola, no del agente.
