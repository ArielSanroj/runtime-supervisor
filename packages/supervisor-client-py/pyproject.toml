[project]
name = "supervisor-client"
version = "0.3.1"
description = "Python client for runtime-supervisor — evaluate, review, and audit agent actions."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Ariel San Martín" }]
requires-python = ">=3.10"
keywords = ["ai-agents", "llm", "guardrails", "policy-engine", "runtime-supervisor"]
dependencies = [
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/ArielSanroj/runtime-supervisor"
Repository = "https://github.com/ArielSanroj/runtime-supervisor"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supervisor_client"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
