[project]
name = "supervisor-client"
version = "0.1.0"
description = "Python client for runtime-supervisor (Agentic Internal Controls)"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.uv.sources]
supervisor-api = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supervisor_client"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
