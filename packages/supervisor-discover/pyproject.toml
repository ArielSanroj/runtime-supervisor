[project]
name = "supervisor-discover"
version = "0.1.0"
description = "Scan an agent repo and install runtime supervision guards"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
supervisor-discover = "supervisor_discover.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supervisor_discover"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
