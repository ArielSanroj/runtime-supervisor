[project]
name = "supervisor-guards"
version = "0.3.0"
description = "Wrap unsafe agent actions with one decorator. Shadow-mode by default."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Ariel San Martín" }]
requires-python = ">=3.10"
keywords = ["ai-agents", "llm", "guardrails", "policy-engine", "shadow-mode", "runtime-supervisor"]
dependencies = [
    "supervisor-client>=0.3,<0.4",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/ArielSanroj/runtime-supervisor"
Repository = "https://github.com/ArielSanroj/runtime-supervisor"

[project.optional-dependencies]
dev = ["pytest>=8.0", "uvicorn>=0.32"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supervisor_guards"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
