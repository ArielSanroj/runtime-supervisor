[project]
name = "supervisor-guards"
version = "0.1.0"
description = "Runtime enforcement decorators for runtime-supervisor"
requires-python = ">=3.10"
dependencies = [
    "supervisor-client>=0.1",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "uvicorn>=0.32"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supervisor_guards"]

[tool.uv.sources]
supervisor-client = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
