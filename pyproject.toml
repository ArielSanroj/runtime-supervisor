[tool.uv.workspace]
members = [
    "services/supervisor_api",
    "packages/supervisor-client-py",
    "packages/mcp-supervisor",
    "packages/supervisor-guards-py",
    "packages/supervisor-discover",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008"]  # B008: FastAPI idiom uses Depends() in defaults
